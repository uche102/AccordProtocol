version: 2
updates:
  # Cargo dependencies (contract)
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - rust

  # npm dependencies (frontend)
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - javascript

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
