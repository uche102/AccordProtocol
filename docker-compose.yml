services:
  stellar:
    image: stellar/quickstart:testing
    platform: linux/amd64
    ports:
      - "8000:8000"  # Soroban RPC
      - "8001:8001"  # Horizon
    environment:
      - NETWORK=local
    command: ["--local", "--enable-soroban-rpc"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
